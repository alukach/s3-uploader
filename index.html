<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>S3 Multipart Uploader</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>One-Off S3 Uploader</h1>
        <p class="subtitle">
          Drag files in, then upload directly from this page to a public-write S3 bucket.
        </p>
      </header>

      <section class="card settings">
        <h2>Upload Settings</h2>
        <div class="grid">
          <label>
            Bucket Name
            <input id="bucket" type="text" placeholder="my-upload-bucket" required />
          </label>
          <label>
            Region
            <input id="region" type="text" value="us-east-1" />
          </label>
          <label>
            Key Prefix (optional)
            <input id="prefix" type="text" placeholder="uploads/2026-03-03" />
          </label>
          <label>
            Part Size (MB)
            <input id="partSize" type="number" min="5" value="8" />
          </label>
          <label>
            Part Concurrency
            <input id="partConcurrency" type="number" min="1" max="32" value="8" />
          </label>
          <label>
            Parallel Files
            <input id="fileConcurrency" type="number" min="1" max="8" value="2" />
          </label>
        </div>
        <label class="checkbox">
          <input id="pathStyle" type="checkbox" />
          Use path-style endpoint (`s3.<region>.amazonaws.com/<bucket>/...`)
        </label>
      </section>

      <section class="card">
        <div id="dropzone" class="dropzone" tabindex="0" role="button" aria-label="Select files to upload">
          <p><strong>Drag & drop files here</strong></p>
          <p>or click to browse</p>
          <input id="fileInput" type="file" multiple hidden />
        </div>

        <div class="actions">
          <button id="clearFiles" type="button" class="secondary">Clear Files</button>
          <button id="startUpload" type="button">Start Upload</button>
        </div>

        <div class="overall">
          <div class="overall-head">
            <span>Overall Progress</span>
            <span id="overallText">0%</span>
          </div>
          <div class="progress">
            <div id="overallBar" class="bar"></div>
          </div>
        </div>

        <ul id="fileList" class="file-list"></ul>
      </section>

      <section class="card">
        <h2>Activity</h2>
        <pre id="log" class="log" aria-live="polite"></pre>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
